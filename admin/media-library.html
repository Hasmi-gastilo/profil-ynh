<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Media Library — Admin LPI Nurul Huda</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title">Media Library</div>
          <div class="admin-page-subtitle">Kelola semua file media</div>
        </div>
        <button class="btn-admin btn-admin-primary" id="btnUpload"><i class="fas fa-upload"></i> Upload File</button>
      </div>
      <div class="admin-card">
        <div class="admin-card-header">
          <div>
            <div class="admin-card-title">Semua Media</div>
          </div>
          <select id="folderFilter" class="form-control" style="width:200px;">
            <option value="all">Semua Folder</option>
            <option value="banner">Banner</option>
            <option value="news">Berita</option>
            <option value="gallery">Galeri</option>
            <option value="achievements">Prestasi</option>
            <option value="profile">Profil</option>
          </select>
        </div>
        <div class="admin-card-body">
          <div class="media-grid" id="mediaGrid">
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
            <div class="skeleton" style="aspect-ratio:1;border-radius:10px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script type="module" src="../assets/js/admin/media-library-admin.js"></script>
</body>

</html>
