<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="formPageTitle">Tulis Berita — Admin LPI Nurul Huda Kapedi</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title" id="formTitle">Tulis Berita Baru</div>
          <div class="admin-page-subtitle"><a href="berita.html" style="color:var(--admin-primary);">← Kembali ke Daftar
              Berita</a></div>
        </div>
        <div class="admin-page-header-actions">
          <button class="btn-admin btn-admin-outline" id="saveDraft"><i class="fas fa-file"></i> Simpan Draft</button>
          <button class="btn-admin btn-admin-primary" id="publishBtn"><i class="fas fa-paper-plane"></i>
            Terbitkan</button>
        </div>
      </div>

      <div class="admin-dashboard-grid admin-berita-form-grid">
        <!-- Main Content -->
        <div>
          <div class="admin-card" style="margin-bottom:20px;">
            <div class="admin-card-body">
              <div class="form-group">
                <label class="form-label">Judul Berita <span class="required">*</span></label>
                <input type="text" id="beritaJudul" class="form-control"
                  placeholder="Masukkan judul berita yang menarik..." style="font-size:1.1rem;font-weight:700;" />
              </div>
              <div class="form-group">
                <label class="form-label">Slug URL</label>
                <div style="display:flex;gap:8px;">
                  <input type="text" id="beritaSlug" class="form-control" placeholder="akan-otomatis-dibuat" readonly
                    style="background:var(--admin-bg);" />
                  <button type="button" class="btn-admin btn-admin-outline btn-admin-sm" id="editSlug"
                    style="white-space:nowrap;">Edit</button>
                </div>
                <div class="form-hint">URL publik: .../berita-detail.html?slug=<span id="slugPreview">...</span></div>
              </div>
              <div class="form-group">
                <label class="form-label">Ringkasan / Excerpt</label>
                <textarea id="beritaExcerpt" class="form-control" rows="3"
                  placeholder="Ringkasan singkat (opsional, maks 200 karakter)"></textarea>
              </div>
            </div>
          </div>

          <div class="admin-card">
            <div class="admin-card-header">
              <div class="admin-card-title">Konten Berita</div>
            </div>
            <div id="quillEditor" style="min-height:400px;"></div>
          </div>
        </div>

        <!-- Sidebar Options -->
        <div>
          <!-- Thumbnail -->
          <div class="admin-card" style="margin-bottom:16px;">
            <div class="admin-card-header">
              <div class="admin-card-title">Thumbnail Berita</div>
              <button type="button" id="changeThumbBtn" class="btn-admin btn-admin-outline btn-admin-sm" style="display:none;font-size:0.75rem;">
                <i class="fas fa-pencil-alt"></i> Ganti
              </button>
            </div>
            <div class="admin-card-body">
              <div id="uploadAreaWrap">
                <div class="upload-area" id="thumbnailArea" style="cursor:pointer;">
                  <input type="file" id="thumbnailFile" accept="image/*" style="display:none;" />
                  <div class="upload-icon"><i class="fas fa-image"></i></div>
                  <div class="upload-text">Upload thumbnail berita</div>
                  <div class="upload-hint">Rekomendasi: 1200×675px (16:9)</div>
                </div>
              </div>

              <div class="progress-bar-wrap" id="thumbProgress" style="display:none;margin-top:10px;">
                <div class="progress-bar" id="thumbProgressBar"></div>
              </div>

              <!-- ── IMAGE POSITION EDITOR ── -->
              <div id="photoEditorContainer" style="margin-top:12px;"></div>
              <input type="hidden" id="thumbnailUrl" />

              <div id="ipeHint" style="display:none;margin-top:8px;padding:10px;background:rgba(27,79,138,0.06);border-radius:8px;border:1px solid rgba(27,79,138,0.15);">
                <div style="font-size:0.75rem;color:var(--admin-text-muted);line-height:1.5;">
                  <i class="fas fa-info-circle" style="color:var(--admin-primary);"></i> <strong>Geser</strong> untuk mengatur crop, <strong>scroll</strong> untuk zoom.
                </div>
              </div>
            </div>
          </div>

          <!-- Meta -->
          <div class="admin-card" style="margin-bottom:16px;">
            <div class="admin-card-header">
              <div class="admin-card-title">Detail Artikel</div>
            </div>
            <div class="admin-card-body">
              <div class="form-group">
                <label class="form-label">Kategori</label>
                <input type="text" id="beritaKategori" class="form-control" placeholder="Mis: Akademik, Kegiatan, PPDB"
                  list="kategoriList" />
                <datalist id="kategoriList">
                  <option value="Berita Sekolah" />
                  <option value="Akademik" />
                  <option value="Kegiatan" />
                  <option value="Prestasi" />
                  <option value="PPDB" />
                  <option value="Pengumuman" />
                </datalist>
              </div>
              <div class="form-group">
                <label class="form-label">Penulis</label>
                <input type="text" id="beritaPenulis" class="form-control" placeholder="Nama penulis" />
              </div>
              <div class="form-group">
                <label class="form-label">Tags (pisah dengan koma)</label>
                <input type="text" id="beritaTags" class="form-control" placeholder="tag1, tag2, tag3" />
              </div>
              <div class="form-group">
                <label class="form-label">Tanggal Publikasi</label>
                <input type="date" id="beritaTanggal" class="form-control" />
              </div>
            </div>
          </div>

          <!-- Status -->
          <div class="admin-card">
            <div class="admin-card-header">
              <div class="admin-card-title">Status</div>
            </div>
            <div class="admin-card-body">
              <select id="beritaStatus" class="form-control">
                <option value="draft">Draft</option>
                <option value="published">Diterbitkan</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js" crossorigin="anonymous"></script>
  <script type="module" src="../assets/js/admin/berita-admin.js"></script>
</body>

</html>
