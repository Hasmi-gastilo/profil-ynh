<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Kontak & Media Sosial — Admin LPI Nurul Huda</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title">Kontak & Media Sosial</div>
          <div class="admin-page-subtitle">Edit informasi kontak dan link media sosial</div>
        </div>
        <button class="btn-admin btn-admin-primary" id="saveKontak"><i class="fas fa-save"></i> Simpan
          Perubahan</button>
      </div>

      <div class="form-grid-2">
        <!-- Kontak -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title"><i class="fas fa-phone"></i> Informasi Kontak</div>
          </div>
          <div class="admin-card-body">
            <div class="form-group"><label class="form-label">Alamat Lengkap</label><textarea id="kAddress"
                class="form-control" rows="3" placeholder="Jl. ..."></textarea></div>
            <div class="form-group"><label class="form-label">Nomor Telepon</label><input type="tel" id="kPhone"
                class="form-control" placeholder="0328-..." /></div>
            <div class="form-group"><label class="form-label">Nomor WhatsApp</label><input type="tel" id="kWhatsapp"
                class="form-control" placeholder="628xxxxxxxxxx" />
              <div class="form-hint">Format internasional: 628xxxxx</div>
            </div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" id="kEmail"
                class="form-control" placeholder="info@sekolah.com" /></div>
            <div class="form-group"><label class="form-label">Google Maps URL (Embed)</label><textarea id="kMapsEmbed"
                class="form-control" rows="3"
                placeholder='&lt;iframe src="https://www.google.com/maps/embed?..." ...&gt;&lt;/iframe&gt;'></textarea>
              <div class="form-hint">Paste kode embed dari Google Maps</div>
            </div>
          </div>
        </div>

        <!-- Media Sosial -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title"><i class="fas fa-share-alt"></i> Media Sosial</div>
          </div>
          <div class="admin-card-body">
            <div class="form-group">
              <label class="form-label"><i class="fab fa-facebook-f" style="color:#1877F2;"></i> Facebook</label>
              <input type="url" id="smFacebook" class="form-control" placeholder="https://facebook.com/..." />
            </div>
            <div class="form-group">
              <label class="form-label"><i class="fab fa-instagram" style="color:#E1306C;"></i> Instagram</label>
              <input type="url" id="smInstagram" class="form-control" placeholder="https://instagram.com/..." />
            </div>
            <div class="form-group">
              <label class="form-label"><i class="fab fa-tiktok"></i> TikTok</label>
              <input type="url" id="smTiktok" class="form-control" placeholder="https://tiktok.com/@..." />
            </div>
            <div class="form-group">
              <label class="form-label"><i class="fab fa-youtube" style="color:#FF0000;"></i> YouTube</label>
              <input type="url" id="smYoutube" class="form-control" placeholder="https://youtube.com/@..." />
            </div>
            <div class="form-group">
              <label class="form-label"><i class="fab fa-twitter" style="color:#1DA1F2;"></i> Twitter / X</label>
              <input type="url" id="smTwitter" class="form-control" placeholder="https://twitter.com/..." />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script type="module" src="../assets/js/admin/kontak-admin.js"></script>
</body>

</html>
