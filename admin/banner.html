<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manajemen Banner — Admin LPI Nurul Huda Kapedi</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main" id="adminMain">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title">Banner Homepage</div>
          <div class="admin-page-subtitle">Kelola slider banner di halaman utama</div>
        </div>
        <button class="btn-admin btn-admin-primary" id="btnAddBanner"><i class="fas fa-plus"></i> Tambah Banner</button>
      </div>

      <!-- Banner List -->
      <div class="admin-card">
        <div class="admin-card-header">
          <div class="admin-card-title">Daftar Banner</div>
          <div class="admin-card-subtitle" id="bannerCount">-</div>
        </div>
        <div id="bannerList" style="padding:16px;display:flex;flex-direction:column;gap:16px;">
          <div class="skeleton" style="height:100px;border-radius:12px;"></div>
          <div class="skeleton" style="height:100px;border-radius:12px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Add/Edit Banner -->
  <div class="admin-modal-overlay" id="bannerModal">
    <div class="admin-modal admin-modal-lg">
      <div class="admin-modal-header">
        <div class="admin-modal-title" id="bannerModalTitle">Tambah Banner</div>
        <button class="admin-modal-close" id="closeBannerModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="admin-modal-body">
        <form id="bannerForm" novalidate>
          <input type="hidden" id="bannerId" />
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Judul <span class="required">*</span></label>
              <input type="text" id="bannerTitle" class="form-control" placeholder="Judul banner" required />
            </div>
            <div class="form-group">
              <label class="form-label">Sub Judul</label>
              <input type="text" id="bannerSubtitle" class="form-control" placeholder="Sub judul / deskripsi singkat" />
            </div>
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Teks Tombol</label>
              <input type="text" id="bannerBtnText" class="form-control" placeholder="Mis: Daftar Sekarang" />
            </div>
            <div class="form-group">
              <label class="form-label">URL Tombol</label>
              <input type="url" id="bannerBtnUrl" class="form-control" placeholder="https://..." />
            </div>
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Urutan</label>
              <input type="number" id="bannerOrder" class="form-control" value="1" min="1" />
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select id="bannerActive" class="form-control">
                <option value="true">Aktif</option>
                <option value="false">Nonaktif</option>
              </select>
            </div>
          </div>
          <!-- Ukuran Teks -->
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label"><i class="fas fa-text-height"
                  style="color:var(--admin-primary);margin-right:6px;"></i>Ukuran Judul</label>
              <select id="bannerTitleSize" class="form-control">
                <option value="small">Kecil — cocok untuk teks panjang</option>
                <option value="medium" selected>Sedang — rekomendasi</option>
                <option value="large">Besar — teks singkat/impactful</option>
                <option value="xlarge">Sangat Besar — 1-3 kata saja</option>
              </select>
              <div class="form-hint">Atur ukuran judul agar tidak terlalu besar/kecil di layar</div>
            </div>
            <div class="form-group">
              <label class="form-label"><i class="fas fa-text-width"
                  style="color:var(--admin-primary);margin-right:6px;"></i>Ukuran Sub Judul</label>
              <select id="bannerSubtitleSize" class="form-control">
                <option value="small">Kecil</option>
                <option value="medium" selected>Sedang — rekomendasi</option>
                <option value="large">Besar</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Gambar Banner</label>
            <div class="upload-area" id="bannerUploadArea">
              <input type="file" id="bannerImage" accept="image/*" />
              <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
              <div class="upload-text">Klik atau seret foto ke sini</div>
              <div class="upload-hint">JPG, PNG, WebP — Gambar otomatis dikompres — Rekomendasi: 1920×600px</div>
            </div>
            <div class="progress-bar-wrap" id="bannerProgress" style="display:none;">
              <div class="progress-bar" id="bannerProgressBar"></div>
              <div id="bannerProgressLabel"
                style="text-align:center;font-size:0.75rem;color:var(--admin-text-muted);margin-top:4px;">Mengompres &
                mengunggah gambar...</div>
            </div>
            <img id="bannerPreviewImg" src="" alt=""
              style="margin-top:12px;max-height:200px;border-radius:10px;display:none;width:100%;object-fit:cover;" />
            <input type="hidden" id="bannerImageUrl" />
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-admin btn-admin-outline" id="cancelBanner">Batal</button>
        <button class="btn-admin btn-admin-primary" id="saveBanner"><i class="fas fa-save"></i> Simpan Banner</button>
      </div>
    </div>
  </div>

  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script type="module" src="../assets/js/admin/banner-admin.js"></script>
</body>

</html>
