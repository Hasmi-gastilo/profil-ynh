<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Manajemen FAQ — Admin LPI Nurul Huda</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title">Manajemen FAQ</div>
          <div class="admin-page-subtitle">Kelola pertanyaan yang sering diajukan</div>
        </div>
        <button class="btn-admin btn-admin-primary" id="btnAdd"><i class="fas fa-plus"></i> Tambah FAQ</button>
      </div>
      <div class="admin-card">
        <div id="faqList" style="padding:16px;display:flex;flex-direction:column;gap:10px;"></div>
      </div>
    </div>
  </div>
  <div class="admin-modal-overlay" id="faqModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <div class="admin-modal-title" id="modalTitle">Tambah FAQ</div>
        <button class="admin-modal-close" id="closeModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="admin-modal-body">
        <input type="hidden" id="faqId" />
        <div class="form-group"><label class="form-label">Pertanyaan <span class="required">*</span></label><input
            type="text" id="fQuestion" class="form-control" required /></div>
        <div class="form-group"><label class="form-label">Jawaban <span class="required">*</span></label><textarea
            id="fAnswer" class="form-control" rows="5" required></textarea></div>
        <div class="form-group"><label class="form-label">Urutan</label><input type="number" id="fOrder"
            class="form-control" value="1" min="1" /></div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-admin btn-admin-outline" id="cancelModal">Batal</button>
        <button class="btn-admin btn-admin-primary" id="saveFaq"><i class="fas fa-save"></i> Simpan</button>
      </div>
    </div>
  </div>
  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script type="module" src="../assets/js/admin/faq-admin.js"></script>
</body>

</html>
