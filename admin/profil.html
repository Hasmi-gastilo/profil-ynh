<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil Sekolah — Admin LPI Nurul Huda Kapedi</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="adminSidebarSlot"></div>
  <div class="admin-main">
    <div id="adminTopbarSlot"></div>
    <div class="admin-content">
      <div class="admin-page-header">
        <div>
          <div class="admin-page-title">Profil Sekolah</div>
          <div class="admin-page-subtitle">Edit informasi profil yayasan</div>
        </div>
        <button class="btn-admin btn-admin-primary" id="saveProfil"><i class="fas fa-save"></i> Simpan
          Perubahan</button>
      </div>

      <div class="admin-tabs">
        <div class="admin-tab active" data-tab="info">Informasi Dasar</div>
        <div class="admin-tab" data-tab="principal">Kepala Yayasan</div>
        <div class="admin-tab" data-tab="visi">Visi & Misi</div>
        <div class="admin-tab" data-tab="program">Program & Nilai</div>
        <div class="admin-tab" data-tab="deskripsi">Deskripsi</div>
      </div>

      <!-- Tab: Info Dasar -->
      <div class="tab-panel" id="tab-info">
        <div class="admin-card">
          <div class="admin-card-body">
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Nama Yayasan</label>
                <input type="text" id="schoolName" class="form-control" placeholder="Nama lengkap yayasan" />
              </div>
              <div class="form-group">
                <label class="form-label">Tahun Berdiri</label>
                <input type="text" id="foundedYear" class="form-control" placeholder="Mis: 2001" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Sejarah Singkat</label>
              <div id="historyEditor" style="min-height:200px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Kepala Yayasan -->
      <div class="tab-panel" id="tab-principal" style="display:none;">
        <div class="admin-card">
          <div class="admin-card-body">
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Nama Kepala Yayasan</label>
                <input type="text" id="principalName" class="form-control" />
              </div>
              <div class="form-group">
                <label class="form-label">Jabatan / Gelar</label>
                <input type="text" id="principalRole" class="form-control" placeholder="Mis: Kepala Yayasan" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Pesan / Kata Sambutan</label>
              <textarea id="principalMessage" class="form-control" rows="6"
                placeholder="Tuliskan pesan kepala yayasan..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Foto Kepala Yayasan</label>
              <div class="upload-area">
                <input type="file" id="principalPhotoFile" accept="image/*" />
                <div class="upload-icon"><i class="fas fa-user-circle"></i></div>
                <div class="upload-text">Klik untuk upload foto</div>
                <div class="upload-hint">JPG, PNG — Maks 3MB</div>
              </div>
              <div class="progress-bar-wrap" id="principalPhotoProgress" style="display:none;">
                <div class="progress-bar" id="principalPhotoBar"></div>
              </div>
              <div id="principalPhotoPreviewWrap" style="position:relative;display:none;width:max-content;margin-top:12px;">
                <img id="principalPhotoPreview" src=""
                  style="width:150px;height:180px;object-fit:cover;border-radius:12px;border:2px solid var(--admin-border);" />
                <button type="button" id="removePrincipalPhoto" style="position:absolute;top:-10px;right:-10px;background:#dc2626;color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,0.2);">
                  <i class="fas fa-times"></i>
                </button>
              </div>
              <input type="hidden" id="principalPhotoUrl" />
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Visi & Misi -->
      <div class="tab-panel" id="tab-visi" style="display:none;">
        <div class="admin-card">
          <div class="admin-card-body">
            <div class="form-group">
              <label class="form-label">Visi</label>
              <div id="visionEditor" style="min-height:120px;"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Misi</label>
              <div id="missionEditor" style="min-height:200px;"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Tujuan</label>
              <div id="goalsEditor" style="min-height:150px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Program & Nilai -->
      <div class="tab-panel" id="tab-program" style="display:none;">
        <div class="admin-card">
          <div class="admin-card-body">
            <div class="form-group">
              <label class="form-label">Program Unggulan</label>
              <div id="programsEditor" style="min-height:200px;"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Nilai-Nilai Sekolah</label>
              <div id="valuesEditor" style="min-height:150px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Deskripsi -->
      <div class="tab-panel" id="tab-deskripsi" style="display:none;">
        <div class="admin-card">
          <div class="admin-card-body">
            <div class="form-group">
              <label class="form-label">Deskripsi Lengkap Sekolah</label>
              <div id="descriptionEditor" style="min-height:300px;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div id="adminToastContainer" class="admin-toast-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js" crossorigin="anonymous"></script>
  <script type="module" src="../assets/js/admin/profil-admin.js"></script>
</body>

</html>
