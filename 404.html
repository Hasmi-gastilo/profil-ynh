<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Halaman Tidak Ditemukan | LPI Nurul Huda Kapedi</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    }

    .not-found-wrap {
      color: #fff;
      padding: 40px 20px;
      max-width: 600px;
    }

    .not-found-code {
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      color: rgba(255, 255, 255, 0.12);
      line-height: 1;
    }

    .not-found-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
    }

    .not-found-desc {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    img.not-found-logo {
      width: 80px;
      margin: 0 auto 24px;
    }
  </style>
</head>

<body>
  <div class="not-found-wrap">
    <img src="assets/images/logo.png" alt="Logo LPI Nurul Huda" class="not-found-logo" />
    <div class="not-found-code">404</div>
    <h1 class="not-found-title">Halaman Tidak Ditemukan</h1>
    <p class="not-found-desc">Halaman yang Anda cari tidak ada atau telah dipindahkan. Silakan kembali ke beranda.</p>
    <a href="index.html" class="btn btn-accent btn-lg">
      <i class="fas fa-home"></i> Kembali ke Beranda
    </a>
  </div>
</body>

</html>
